<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Neuro ICU Recorder</title>
<style>
body { margin:0; padding:0; background:#0a0c0f; color:#f0f0ee; font-family:sans-serif; height:100vh; display:flex; }
#app { width:100%; max-width:480px; margin:auto; display:flex; flex-direction:column; }
.screen { display:none; flex:1; padding:20px; overflow-y:auto; }
.screen.active { display:flex; flex-direction:column; }
h1 { font-size:28px; margin:0 0 20px 0; }
input { width:100%; padding:15px; font-size:20px; border:1px solid #333; background:#111; color:#fff; border-radius:8px; margin:20px 0; text-align:center; }
button { width:100%; padding:15px; margin:10px 0; font-size:16px; background:#4ade9b; color:#000; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
button:active { opacity:0.8; }
textarea { width:100%; height:150px; padding:10px; background:#111; color:#fff; border:1px solid #333; border-radius:8px; font-size:14px; }
.entry { background:#111; padding:15px; margin:10px 0; border-radius:8px; cursor:pointer; border:1px solid #333; }
.entry-title { font-weight:bold; margin-bottom:5px; }
.entry-date { font-size:12px; color:#888; }
.nav { display:flex; gap:10px; padding:10px 0; border-top:1px solid #333; }
.nav button { flex:1; margin:0; }
.timer { font-size:32px; font-weight:bold; text-align:center; margin:20px 0; font-family:monospace; }
</style>
</head>
<body>

<div id="app">
  <!-- PIN SCREEN -->
  <div id="pin-screen" class="screen active">
    <h1 style="text-align:center;">🧠 Neuro ICU</h1>
    <input id="pin-input" type="password" placeholder="Enter PIN" maxlength="4" inputmode="numeric">
    <button onclick="checkPin()">Enter</button>
  </div>

  <!-- RECORD SCREEN -->
  <div id="record-screen" class="screen">
    <h1>Record</h1>
    <div class="timer" id="timer">0:00</div>
    <button id="rec-btn" onclick="toggleRecord()">🎤 Start Recording</button>
    <textarea id="transcript" placeholder="Transcript will appear here..." readonly></textarea>
    <button id="save-btn" onclick="saveEntry()" style="display:none;">Save Entry</button>
    <button id="cancel-btn" onclick="cancelRecord()" style="display:none;">Cancel</button>
  </div>

  <!-- LIBRARY SCREEN -->
  <div id="library-screen" class="screen">
    <h1>Library</h1>
    <div id="entries"></div>
  </div>

  <!-- DETAIL SCREEN -->
  <div id="detail-screen" class="screen">
    <h1 id="detail-title">Entry</h1>
    <textarea id="detail-text" readonly></textarea>
    <button onclick="backToLibrary()">← Back</button>
    <button onclick="copyEntry()">📋 Copy</button>
    <button onclick="deleteEntry()">Delete</button>
  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <button onclick="showScreen('record')">Record</button>
    <button onclick="showScreen('library')">Library</button>
  </div>
</div>

<script>
const CORRECT_PIN = '0919';
let isRecording = false;
let recognition = null;
let fullTranscript = '';
let recordTime = 0;
let timerInt = null;
let currentEntry = null;

// PIN
function checkPin() {
  const pin = document.getElementById('pin-input').value;
  if(pin === CORRECT_PIN) {
    document.getElementById('pin-screen').classList.remove('active');
    showScreen('record');
  } else {
    alert('Wrong PIN');
    document.getElementById('pin-input').value = '';
  }
}

// SCREENS
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  if(name === 'library') loadEntries();
}

// RECORD
function toggleRecord() {
  if(isRecording) stopRecord();
  else startRecord();
}

function startRecord() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { alert('Speech recognition not supported'); return; }
  
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  
  fullTranscript = '';
  isRecording = true;
  recordTime = 0;
  
  document.getElementById('rec-btn').textContent = '⏹ Stop Recording';
  document.getElementById('rec-btn').style.background = '#ff5a5a';
  document.getElementById('rec-btn').disabled = false;
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('transcript').value = 'Recording...';
  
  timerInt = setInterval(() => {
    recordTime++;
    const m = Math.floor(recordTime / 60);
    const s = recordTime % 60;
    document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
  }, 1000);
  
  recognition.onresult = (e) => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      if(e.results[i].isFinal) fullTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('transcript').value = fullTranscript + interim;
  };
  
  recognition.start();
}

function stopRecord() {
  isRecording = false;
  if(recognition) recognition.stop();
  clearInterval(timerInt);
  
  // Keep transcript visible, show save buttons
  document.getElementById('transcript').value = fullTranscript;
  document.getElementById('rec-btn').textContent = '🎤 Start Recording';
  document.getElementById('rec-btn').style.background = '#4ade9b';
  document.getElementById('rec-btn').disabled = true;
  document.getElementById('save-btn').style.display = 'block';
  document.getElementById('cancel-btn').style.display = 'block';
}

function cancelRecord() {
  if(recognition) recognition.stop();
  isRecording = false;
  clearInterval(timerInt);
  fullTranscript = '';
  recordTime = 0;
  
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('transcript').value = '';
  document.getElementById('rec-btn').textContent = '🎤 Start Recording';
  document.getElementById('rec-btn').style.background = '#4ade9b';
  document.getElementById('rec-btn').disabled = false;
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'none';
}

function saveEntry() {
  if(!fullTranscript.trim()) { alert('No transcript'); return; }
  
  const entry = {
    id: Date.now(),
    title: 'Case ' + new Date().toLocaleDateString(),
    transcript: fullTranscript.trim(),
    date: new Date().toLocaleDateString(),
    time: new Date().toLocaleTimeString()
  };
  
  const entries = JSON.parse(localStorage.getItem('entries') || '[]');
  entries.unshift(entry);
  localStorage.setItem('entries', JSON.stringify(entries));
  
  alert('Saved! ✓');
  
  // Reset for next recording
  fullTranscript = '';
  recordTime = 0;
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('transcript').value = '';
  document.getElementById('rec-btn').textContent = '🎤 Start Recording';
  document.getElementById('rec-btn').style.background = '#4ade9b';
  document.getElementById('rec-btn').disabled = false;
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'none';
}

// LIBRARY
function loadEntries() {
  const entries = JSON.parse(localStorage.getItem('entries') || '[]');
  const html = entries.length ? entries.map((e, i) => `
    <div class="entry" onclick="viewEntry(${i})">
      <div class="entry-title">${e.title}</div>
      <div class="entry-date">${e.date} ${e.time}</div>
    </div>
  `).join('') : '<p style="color:#888;">No entries yet</p>';
  document.getElementById('entries').innerHTML = html;
}

function viewEntry(idx) {
  const entries = JSON.parse(localStorage.getItem('entries') || '[]');
  currentEntry = entries[idx];
  document.getElementById('detail-title').textContent = currentEntry.title;
  document.getElementById('detail-text').value = currentEntry.transcript;
  showScreen('detail');
}

function backToLibrary() {
  currentEntry = null;
  showScreen('library');
}

function copyEntry() {
  if(!currentEntry) return;
  navigator.clipboard.writeText(currentEntry.transcript);
  alert('Copied! ✓');
}

function deleteEntry() {
  if(!confirm('Delete?')) return;
  const entries = JSON.parse(localStorage.getItem('entries') || '[]');
  entries.splice(entries.indexOf(currentEntry), 1);
  localStorage.setItem('entries', JSON.stringify(entries));
  backToLibrary();
}
</script>

</body>
</html>
