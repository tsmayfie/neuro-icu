<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neuro ICU">
    <title>Neuro ICU Recorder - Smart Clinical Documentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            padding: 0;
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            background: #1a1a1a;
            padding: 1rem;
            border-bottom: 1px solid #333333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: rgba(226, 232, 240, 0.1);
            color: #e2e8f0;
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:active {
            background: rgba(226, 232, 240, 0.2);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
        }

        .pin-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 2rem;
        }

        .pin-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        .pin-display {
            font-size: 2.2rem;
            letter-spacing: 1.2rem;
            font-weight: bold;
            color: #888888;
            min-height: 50px;
            text-align: center;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 1rem 0;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
            margin: 1.5rem auto;
            justify-content: center;
        }

        .pin-button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 8px;
            background: #2a2a2a;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pin-button:active {
            background: #3a3a3a;
            transform: scale(0.95);
        }

        .pin-button.backspace {
            grid-column: 3;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 300px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .entry-mode-select {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .mode-button {
            padding: 1.5rem;
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: 12px;
            background: rgba(51, 65, 85, 0.5);
            color: #e2e8f0;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .mode-button:active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .mode-button h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .mode-button p {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .recording-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .recording-status {
            text-align: center;
            padding: 1.5rem;
            background: rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .recording-time {
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #ef4444;
            margin-bottom: 0.5rem;
        }

        .recording-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #ef4444;
            font-weight: 600;
        }

        .recording-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .transcript-section {
            background: rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .transcript-section h3 {
            margin-bottom: 0.75rem;
            color: #cbd5e1;
        }

        .transcript-text {
            background: rgba(30, 41, 59, 0.8);
            padding: 1rem;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 0.95rem;
            max-height: 200px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .parsed-output {
            background: rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .parsed-section {
            margin-bottom: 1.5rem;
        }

        .parsed-section h4 {
            color: #60a5fa;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .parsed-content {
            background: rgba(30, 41, 59, 0.8);
            padding: 0.75rem;
            border-radius: 6px;
            line-height: 1.5;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:active {
            background: rgba(148, 163, 184, 0.3);
        }

        .status-message {
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #6ee7b7;
        }

        .status-loading {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: #93c5fd;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(226, 232, 240, 0.3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .bottom-nav {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.95);
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            flex-shrink: 0;
        }

        .bottom-nav button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .bottom-nav button:active {
            background: rgba(59, 130, 246, 0.3);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .pin-pad {
                grid-template-columns: repeat(3, 50px);
                gap: 8px;
            }

            .pin-button {
                width: 50px;
                height: 50px;
            }

            .header {
                padding: 0.75rem;
            }

            .content {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PIN Screen -->
        <div id="pinScreen" class="pin-screen" style="display: flex;">
            <div style="text-align: center; width: 100%;">
                <h2 class="pin-title">🧠 Neuro ICU Recorder</h2>
                <p style="color: #94a3b8; margin-bottom: 2rem;">Enter 4-digit PIN</p>
                <div class="pin-display" id="pinDisplay">0000</div>
                <div class="pin-pad">
                    <button class="pin-button" onclick="addPin('1')">1</button>
                    <button class="pin-button" onclick="addPin('2')">2</button>
                    <button class="pin-button" onclick="addPin('3')">3</button>
                    <button class="pin-button" onclick="addPin('4')">4</button>
                    <button class="pin-button" onclick="addPin('5')">5</button>
                    <button class="pin-button" onclick="addPin('6')">6</button>
                    <button class="pin-button" onclick="addPin('7')">7</button>
                    <button class="pin-button" onclick="addPin('8')">8</button>
                    <button class="pin-button" onclick="addPin('9')">9</button>
                    <button class="pin-button" onclick="addPin('0')">0</button>
                    <button class="pin-button backspace" onclick="deletePin()">⌫</button>
                </div>
                <button class="btn-primary" onclick="checkPin()" style="margin-top: 1rem;">Enter</button>
            </div>
        </div>

        <!-- Main App Screen -->
        <div id="appScreen" class="hidden">
            <div class="header">
                <h1>📝 Neuro ICU Recorder</h1>
                <div class="header-buttons">
                    <button class="btn-icon" onclick="openSettings()" title="Settings">⚙️</button>
                    <button class="btn-icon" onclick="logout()" title="Logout">🚪</button>
                </div>
            </div>

            <div class="content" id="mainContent"></div>

            <div class="bottom-nav">
                <button onclick="showRecorder()">⏺️ Record</button>
                <button onclick="showLibrary()">📂 Library</button>
                <button onclick="showSettings()">⚙️ Settings</button>
            </div>
        </div>
    </div>

    <script>
        let pin = '';
        const correctPin = '0919'; // Change this to your desired PIN
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTime = 0;
        let recordingTimer = null;
        let currentEntry = null;

        // PIN Functions
        function addPin(digit) {
            if (pin.length < 4) {
                pin += digit;
                updatePinDisplay();
            }
        }

        function deletePin() {
            pin = pin.slice(0, -1);
            updatePinDisplay();
        }

        function updatePinDisplay() {
            document.getElementById('pinDisplay').textContent = pin.padEnd(4, '0');
        }

        function checkPin() {
            if (pin === correctPin) {
                document.getElementById('pinScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                showRecorder();
            } else {
                pin = '';
                updatePinDisplay();
                alert('Incorrect PIN');
            }
        }

        function logout() {
            pin = '';
            updatePinDisplay();
            document.getElementById('pinScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }

        // Recorder Functions
        function showRecorder() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <h2 style="margin-bottom: 1.5rem; color: #e2e8f0;">📋 New Entry</h2>
                
                <div class="entry-mode-select">
                    <button class="mode-button" onclick="startCasePresentation()">
                        <h3>📊 Case Presentation</h3>
                        <p>Dictate clinical case: one-liner → history → exam → assessment → plan</p>
                    </button>
                    <button class="mode-button" onclick="startEducationEntry()">
                        <h3>📚 Education Entry</h3>
                        <p>Save pearls, guidelines, or lessons. Start with topic and category.</p>
                    </button>
                </div>
            `;
        }

        function startCasePresentation() {
            currentEntry = { type: 'case', mode: 'recording' };
            showRecordingUI();
        }

        function startEducationEntry() {
            currentEntry = { type: 'education', mode: 'recording' };
            showRecordingUI();
        }

        function showRecordingUI() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <div style="margin-bottom: 2rem;">
                    <button class="btn-secondary" onclick="showRecorder()" style="margin-bottom: 1rem;">← Back</button>
                    <div class="recording-section">
                        <div class="recording-status">
                            <div class="recording-time" id="recordingTime">00:00</div>
                            <div class="recording-indicator" id="recordingStatus">
                                <span class="recording-dot"></span>
                                Ready to record
                            </div>
                        </div>
                        <button class="btn-primary" id="recordBtn" onclick="startRecording()" style="background: #ef4444; margin-top: 1rem;">🎤 Start Recording</button>
                    </div>
                </div>
                <div id="transcriptArea"></div>
                <div id="analysisArea"></div>
            `;

            recordingTime = 0;
            document.getElementById('recordingTime').textContent = '00:00';
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = handleRecordingStop;

                mediaRecorder.start();
                
                document.getElementById('recordBtn').textContent = '⏹️ Stop Recording';
                document.getElementById('recordBtn').onclick = stopRecording;
                document.getElementById('recordingStatus').innerHTML = '<span class="recording-dot"></span>Recording...';

                recordingTimer = setInterval(() => {
                    recordingTime++;
                    const mins = Math.floor(recordingTime / 60);
                    const secs = recordingTime % 60;
                    document.getElementById('recordingTime').textContent = 
                        `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }, 1000);
            } catch (error) {
                alert('Microphone access denied');
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            clearInterval(recordingTimer);
            document.getElementById('recordingStatus').innerHTML = 'Processing...';
            mediaRecorder.getTracks().forEach(track => track.stop());
        }

        async function handleRecordingStop() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                await processAudio(base64Audio);
            };
            reader.readAsDataURL(audioBlob);
        }

        async function processAudio(base64Audio) {
            const transcriptArea = document.getElementById('transcriptArea');
            const analysisArea = document.getElementById('analysisArea');
            
            transcriptArea.innerHTML = '<div class="status-message status-loading"><span class="loading-spinner"></span>Transcribing audio...</div>';
            analysisArea.innerHTML = '';

            try {
                // Step 1: Transcribe
                const transcribeResponse = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 2000,
                        messages: [{
                            role: 'user',
                            content: [
                                {
                                    type: 'text',
                                    text: 'Transcribe this clinical audio. Return only the transcribed text, nothing else.'
                                },
                                {
                                    type: 'document',
                                    source: {
                                        type: 'base64',
                                        media_type: 'audio/webm',
                                        data: base64Audio
                                    }
                                }
                            ]
                        }]
                    })
                });

                const transcribeData = await transcribeResponse.json();
                const transcript = transcribeData.content[0].text;

                transcriptArea.innerHTML = `
                    <div class="transcript-section">
                        <h3>📝 Transcript</h3>
                        <div class="transcript-text">${transcript}</div>
                    </div>
                `;

                // Step 2: Parse with Claude
                analysisArea.innerHTML = '<div class="status-message status-loading"><span class="loading-spinner"></span>Analyzing with AI...</div>';

                const parsePrompt = currentEntry.type === 'case' 
                    ? `Parse this clinical case dictation into structured sections. Return ONLY valid JSON:
{
  "chiefComplaint": "string",
  "hpi": "paragraph",
  "assessment": "paragraph",
  "neuro": "recommendations or null",
  "cardio": "recommendations or null",
  "pulmonary": "recommendations or null",
  "renal": "recommendations or null",
  "gi": "recommendations or null",
  "other": "recommendations or null"
}`
                    : `Extract from this education entry. Return ONLY valid JSON:
{
  "topic": "string",
  "category": "string",
  "content": "paragraph"
}`;

                const parseResponse = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 2000,
                        messages: [{
                            role: 'user',
                            content: parsePrompt + '\n\nDICTATION:\n' + transcript
                        }]
                    })
                });

                const parseData = await parseResponse.json();
                const jsonText = parseData.content[0].text.replace(/```json|```/g, '').trim();
                const parsed = JSON.parse(jsonText);

                // Display parsed output
                let parsedHTML = '<div class="parsed-output"><h3 style="color: #60a5fa; margin-bottom: 1rem;">✨ Organized Output</h3>';

                if (currentEntry.type === 'case') {
                    if (parsed.chiefComplaint) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Chief Complaint</h4>
                            <div class="parsed-content">${parsed.chiefComplaint}</div>
                        </div>`;
                    if (parsed.hpi) parsedHTML += `
                        <div class="parsed-section">
                            <h4>History of Present Illness</h4>
                            <div class="parsed-content">${parsed.hpi}</div>
                        </div>`;
                    if (parsed.assessment) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Assessment</h4>
                            <div class="parsed-content">${parsed.assessment}</div>
                        </div>`;
                    if (parsed.neuro) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Neuro</h4>
                            <div class="parsed-content">${parsed.neuro}</div>
                        </div>`;
                    if (parsed.cardio) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Cardio</h4>
                            <div class="parsed-content">${parsed.cardio}</div>
                        </div>`;
                    if (parsed.pulmonary) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Pulmonary</h4>
                            <div class="parsed-content">${parsed.pulmonary}</div>
                        </div>`;
                    if (parsed.renal) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Renal</h4>
                            <div class="parsed-content">${parsed.renal}</div>
                        </div>`;
                    if (parsed.gi) parsedHTML += `
                        <div class="parsed-section">
                            <h4>GI/Nutrition</h4>
                            <div class="parsed-content">${parsed.gi}</div>
                        </div>`;
                    if (parsed.other) parsedHTML += `
                        <div class="parsed-section">
                            <h4>Other</h4>
                            <div class="parsed-content">${parsed.other}</div>
                        </div>`;
                } else {
                    parsedHTML += `
                        <div class="parsed-section">
                            <h4>Topic: ${parsed.topic || 'N/A'}</h4>
                        </div>
                        <div class="parsed-section">
                            <h4>Category: ${parsed.category || 'N/A'}</h4>
                        </div>
                        <div class="parsed-section">
                            <h4>Content</h4>
                            <div class="parsed-content">${parsed.content || ''}</div>
                        </div>`;
                }

                parsedHTML += `
                    <div class="button-group">
                        <button class="btn-primary" onclick="copyParsedText('${btoa(JSON.stringify(parsed))}')">📋 Copy to Clipboard</button>
                        <button class="btn-secondary" onclick="saveEntry('${btoa(JSON.stringify(parsed))}')">💾 Save Entry</button>
                        <button class="btn-secondary" onclick="showRecorder()">← New Entry</button>
                    </div>
                </div>`;

                analysisArea.innerHTML = parsedHTML;

            } catch (error) {
                console.error('Error:', error);
                analysisArea.innerHTML = `<div class="status-message" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); color: #fca5a5;">Error processing audio. Make sure you have API access configured.</div>`;
            }
        }

        function copyParsedText(encodedData) {
            const parsed = JSON.parse(atob(encodedData));
            let text = '';
            
            if (parsed.chiefComplaint) text += `CHIEF COMPLAINT:\n${parsed.chiefComplaint}\n\n`;
            if (parsed.hpi) text += `HISTORY OF PRESENT ILLNESS:\n${parsed.hpi}\n\n`;
            if (parsed.assessment) text += `ASSESSMENT:\n${parsed.assessment}\n\n`;
            if (parsed.neuro) text += `NEURO:\n${parsed.neuro}\n\n`;
            if (parsed.cardio) text += `CARDIO:\n${parsed.cardio}\n\n`;
            if (parsed.pulmonary) text += `PULMONARY:\n${parsed.pulmonary}\n\n`;

            navigator.clipboard.writeText(text);
            alert('✓ Copied to clipboard!');
        }

        function saveEntry(encodedData) {
            // Placeholder for Google Drive integration
            alert('Saving... (Google Drive integration coming soon)');
        }

        function showLibrary() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <h2 style="margin-bottom: 1.5rem;">📂 Library</h2>
                <div style="padding: 2rem; text-align: center; color: #94a3b8;">
                    <p>Your saved cases and education entries will appear here.</p>
                    <p style="margin-top: 1rem; font-size: 0.9rem;">Google Drive integration coming soon!</p>
                </div>
            `;
        }

        function showSettings() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `
                <h2 style="margin-bottom: 1.5rem;">⚙️ Settings</h2>
                <div style="color: #94a3b8; padding: 1rem;">
                    <p>🔐 PIN Protection: Enabled</p>
                    <p style="margin-top: 1rem;">📧 Gmail Integration: Ready</p>
                    <p style="margin-top: 1rem;">☁️ Google Drive: Coming Soon</p>
                    <button class="btn-secondary" onclick="logout()" style="margin-top: 2rem; width: 100%;">🚪 Logout</button>
                </div>
            `;
        }

        function openSettings() {
            showSettings();
        }

        // Initialize
        updatePinDisplay();
